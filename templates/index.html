<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior Dev Checklist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3346;
      --text: #e4e6f0;
      --text-dim: #8b8fa3;
      --accent: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app-header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .app-header p {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .global-progress {
      max-width: 500px;
      margin: 1.2rem auto 0;
    }

    .global-progress-bar {
      height: 10px;
      background: var(--surface);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .global-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .global-progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .global-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
    }

    .global-progress-label .pct {
      color: var(--accent);
      font-weight: 600;
    }

    .level-badge {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.3rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    .toolbar {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn:hover { background: var(--surface2); border-color: var(--accent); }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-accent:hover { background: #4f46e5; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }

    .category {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .category:hover { border-color: #3e4460; }

    .category-header {
      display: flex;
      align-items: center;
      padding: 1rem 1.2rem;
      cursor: pointer;
      user-select: none;
      gap: 0.8rem;
      transition: background 0.2s;
    }

    .category-header:hover { background: var(--surface2); }

    .category-icon {
      font-size: 1.5rem;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .category-info { flex: 1; min-width: 0; }
    .category-title { font-weight: 600; font-size: 0.95rem; }

    .category-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.3rem;
    }

    .category-progress-bar {
      flex: 1;
      height: 5px;
      background: var(--bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .category-progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .category-count {
      font-size: 0.78rem;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 45px;
      text-align: right;
    }

    .chevron {
      transition: transform 0.3s;
      color: var(--text-dim);
      font-size: 1.2rem;
    }

    .chevron.open { transform: rotate(90deg); }

    .category-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .category-body.open {
      max-height: 2000px;
    }

    .skills-list { padding: 0 1.2rem 1rem; }

    .skill-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.65rem 0.5rem;
      border-radius: 8px;
      transition: background 0.15s;
      position: relative;
    }

    .skill-item:hover { background: var(--surface2); }

    .skill-check {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s;
      position: relative;
    }

    .skill-check:checked {
      background: var(--success);
      border-color: var(--success);
    }

    .skill-check:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    .skill-content { flex: 1; min-width: 0; }

    .skill-text {
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .skill-text.done {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .skill-note-toggle {
      font-size: 0.75rem;
      color: var(--accent);
      cursor: pointer;
      margin-top: 0.2rem;
      display: inline-block;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .skill-note-toggle:hover { opacity: 1; }

    .skill-note {
      margin-top: 0.4rem;
      display: none;
    }

    .skill-note.visible { display: block; }

    .skill-note textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.5rem;
      font-size: 0.82rem;
      resize: vertical;
      min-height: 50px;
      font-family: inherit;
    }

    .skill-note textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .skill-actions {
      opacity: 0;
      transition: opacity 0.15s;
      display: flex;
      gap: 0.3rem;
      align-items: center;
      flex-shrink: 0;
    }

    .skill-item:hover .skill-actions { opacity: 1; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      border-radius: 4px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .delete-btn:hover { opacity: 1; }

    .add-skill-form {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1.2rem 1rem;
    }

    .add-skill-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5rem 0.8rem;
      font-size: 0.85rem;
      font-family: inherit;
    }

    .add-skill-form input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .add-skill-form input::placeholder { color: var(--text-dim); }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 90%;
      max-width: 450px;
    }

    .modal h3 {
      margin-bottom: 1.2rem;
      font-size: 1.1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.8rem;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
    }

    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    @media (max-width: 640px) {
      .app-header h1 { font-size: 1.3rem; }
      .container { padding: 1rem 0.5rem 3rem; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>Senior Dev Checklist</h1>
  <p>Référentiel de compétences — Backend / Fullstack / Ingénieur Logiciel</p>
  <div class="global-progress">
    <div class="global-progress-bar">
      <div class="global-progress-fill" id="globalFill" style="width: 0%"></div>
    </div>
    <div class="global-progress-label">
      <span id="globalLabel">0 / 0 compétences</span>
      <span class="pct" id="globalPct">0%</span>
    </div>
  </div>
  <div class="level-badge" id="levelBadge"></div>
</header>

<div class="container">
  <div class="stats-bar" id="statsBar"></div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Toutes</button>
    <button class="filter-btn" data-filter="pending">Non maîtrisées</button>
    <button class="filter-btn" data-filter="done">Maîtrisées</button>
  </div>

  <div class="toolbar">
    <button class="btn btn-accent" onclick="openCategoryModal()">+ Nouvelle catégorie</button>
    <button class="btn" onclick="expandAll()">Tout déplier</button>
    <button class="btn" onclick="collapseAll()">Tout replier</button>
  </div>

  <div id="categories"></div>
</div>

<!-- Modal ajout catégorie -->
<div class="modal-backdrop" id="catModal">
  <div class="modal">
    <h3>Nouvelle catégorie</h3>
    <div class="form-group">
      <label>Titre</label>
      <input type="text" id="catTitle" placeholder="Ex: H. DevOps avancé">
    </div>
    <div class="form-group">
      <label>Icône (emoji)</label>
      <input type="text" id="catIcon" placeholder="📌" maxlength="4" value="📌">
    </div>
    <div class="form-group">
      <label>Couleur</label>
      <input type="color" id="catColor" value="#6b7280">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCategoryModal()">Annuler</button>
      <button class="btn btn-accent" onclick="submitCategory()">Créer</button>
    </div>
  </div>
</div>

<script>
let appData = null;
let currentFilter = 'all';
let openCategories = new Set();

async function loadData() {
  const resp = await fetch('/api/data');
  appData = await resp.json();
  render();
}

function getStats() {
  let total = 0, done = 0;
  const cats = [];
  for (const cat of appData.categories) {
    const catTotal = cat.skills.length;
    const catDone = cat.skills.filter(s => s.checked).length;
    total += catTotal;
    done += catDone;
    cats.push({ ...cat, catTotal, catDone });
  }
  return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0, cats };
}

function getLevel(pct) {
  if (pct < 20) return { text: 'Junior', color: '#94a3b8', bg: 'rgba(148,163,184,0.15)' };
  if (pct < 45) return { text: 'Mid-Level', color: '#3b82f6', bg: 'rgba(59,130,246,0.15)' };
  if (pct < 70) return { text: 'Mid-Senior', color: '#a78bfa', bg: 'rgba(167,139,250,0.15)' };
  if (pct < 90) return { text: 'Senior', color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' };
  return { text: 'Staff / Principal', color: '#22c55e', bg: 'rgba(34,197,94,0.15)' };
}

function render() {
  const { total, done, pct, cats } = getStats();
  const level = getLevel(pct);

  document.getElementById('globalFill').style.width = pct + '%';
  document.getElementById('globalLabel').textContent = `${done} / ${total} compétences`;
  document.getElementById('globalPct').textContent = pct + '%';

  const badge = document.getElementById('levelBadge');
  badge.textContent = `Niveau estimé : ${level.text}`;
  badge.style.color = level.color;
  badge.style.background = level.bg;
  badge.style.border = `1px solid ${level.color}40`;

  const statsHtml = cats.map(c => `
    <div class="stat-card">
      <div class="stat-value" style="color: ${c.color}">${c.catTotal > 0 ? Math.round((c.catDone / c.catTotal) * 100) : 0}%</div>
      <div class="stat-label">${c.icon} ${c.title.split('.')[0].trim()}</div>
    </div>
  `).join('');
  document.getElementById('statsBar').innerHTML = statsHtml;

  const catsHtml = cats.map(cat => {
    const skills = filterSkills(cat.skills);
    const isOpen = openCategories.has(cat.id);
    const catPct = cat.catTotal > 0 ? Math.round((cat.catDone / cat.catTotal) * 100) : 0;

    const skillsHtml = skills.map(skill => `
      <div class="skill-item" data-skill-id="${skill.id}">
        <input type="checkbox" class="skill-check"
               ${skill.checked ? 'checked' : ''}
               onchange="toggleSkill('${cat.id}', '${skill.id}')">
        <div class="skill-content">
          <div class="skill-text ${skill.checked ? 'done' : ''}">${escapeHtml(skill.text)}</div>
          <div class="skill-note-toggle" onclick="toggleNote(this)">
            ${skill.note ? '📝 Notes' : '+ Ajouter une note'}
          </div>
          <div class="skill-note ${skill.note ? 'visible' : ''}">
            <textarea placeholder="Mes notes personnelles…"
                      onblur="saveNote('${cat.id}', '${skill.id}', this.value)"
            >${escapeHtml(skill.note || '')}</textarea>
          </div>
        </div>
        <div class="skill-actions">
          <button class="delete-btn" onclick="deleteSkill('${cat.id}', '${skill.id}')" title="Supprimer">✕</button>
        </div>
      </div>
    `).join('');

    return `
      <div class="category" data-cat-id="${cat.id}">
        <div class="category-header" onclick="toggleCategory('${cat.id}')">
          <div class="category-icon" style="background: ${cat.color}20; color: ${cat.color}">${cat.icon}</div>
          <div class="category-info">
            <div class="category-title">${escapeHtml(cat.title)}</div>
            <div class="category-meta">
              <div class="category-progress-bar">
                <div class="category-progress-fill" style="width: ${catPct}%; background: ${cat.color}"></div>
              </div>
              <span class="category-count">${cat.catDone}/${cat.catTotal}</span>
            </div>
          </div>
          <span class="chevron ${isOpen ? 'open' : ''}">›</span>
        </div>
        <div class="category-body ${isOpen ? 'open' : ''}">
          <div class="skills-list">${skillsHtml}</div>
          <div class="add-skill-form">
            <input type="text" placeholder="Ajouter une compétence…"
                   onkeydown="if(event.key==='Enter') addSkillFromInput('${cat.id}', this)">
            <button class="btn btn-sm btn-accent" onclick="addSkillFromInput('${cat.id}', this.previousElementSibling)">+</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('categories').innerHTML = catsHtml;
}

function filterSkills(skills) {
  if (currentFilter === 'done') return skills.filter(s => s.checked);
  if (currentFilter === 'pending') return skills.filter(s => !s.checked);
  return skills;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function toggleCategory(id) {
  if (openCategories.has(id)) openCategories.delete(id);
  else openCategories.add(id);
  render();
}

function expandAll() {
  appData.categories.forEach(c => openCategories.add(c.id));
  render();
}

function collapseAll() {
  openCategories.clear();
  render();
}

async function toggleSkill(catId, skillId) {
  await fetch('/api/toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category_id: catId, skill_id: skillId })
  });
  for (const cat of appData.categories) {
    if (cat.id === catId) {
      for (const s of cat.skills) {
        if (s.id === skillId) { s.checked = !s.checked; break; }
      }
      break;
    }
  }
  render();
}

async function saveNote(catId, skillId, note) {
  await fetch('/api/note', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category_id: catId, skill_id: skillId, note })
  });
  for (const cat of appData.categories) {
    if (cat.id === catId) {
      for (const s of cat.skills) {
        if (s.id === skillId) { s.note = note; break; }
      }
      break;
    }
  }
}

function toggleNote(el) {
  const noteDiv = el.nextElementSibling;
  noteDiv.classList.toggle('visible');
  if (noteDiv.classList.contains('visible')) {
    noteDiv.querySelector('textarea').focus();
  }
}

async function addSkillFromInput(catId, input) {
  const text = input.value.trim();
  if (!text) return;
  await fetch('/api/add_skill', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category_id: catId, text })
  });
  input.value = '';
  await loadData();
}

async function deleteSkill(catId, skillId) {
  if (!confirm('Supprimer cette compétence ?')) return;
  await fetch('/api/delete_skill', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category_id: catId, skill_id: skillId })
  });
  await loadData();
}

function openCategoryModal() {
  document.getElementById('catModal').classList.add('active');
  document.getElementById('catTitle').focus();
}

function closeCategoryModal() {
  document.getElementById('catModal').classList.remove('active');
  document.getElementById('catTitle').value = '';
}

async function submitCategory() {
  const title = document.getElementById('catTitle').value.trim();
  const icon = document.getElementById('catIcon').value || '📌';
  const color = document.getElementById('catColor').value;
  if (!title) return;
  await fetch('/api/add_category', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, icon, color })
  });
  closeCategoryModal();
  await loadData();
}

// Filtres
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

loadData();
</script>
</body>
</html>
